name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pwa

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pwa/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate SQL migrations
        run: |
          for f in ../supabase/migrations/*.sql; do
            echo "Checking $f..."
            # Basic syntax check: ensure file starts with valid SQL
            head -1 "$f" | grep -qE '^(--|CREATE|ALTER|INSERT|DO|BEGIN|SET)' || (echo "ERROR: $f has invalid first line" && exit 1)
          done
          echo "All migrations validated"

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests with coverage
        run: npx vitest run --coverage

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_BOT_NAME: test_bot
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: placeholder

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: pwa/coverage/

  e2e-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pwa

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pwa/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run API e2e tests
        run: npm run test:e2e:api
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_BOT_NAME: test_bot
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: placeholder
          CRON_SECRET: test-cron-secret-local
          NEXT_PUBLIC_APP_URL: http://localhost:3000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: pwa/playwright-report/

  e2e-browser:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pwa
    needs: lint-build-test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pwa/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run browser e2e tests
        run: npx playwright test --project='Mobile Chrome' --project='Desktop Chrome'
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_BOT_NAME: test_bot
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: placeholder
          CRON_SECRET: test-cron-secret-local
          NEXT_PUBLIC_APP_URL: http://localhost:3000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-browser
          path: pwa/playwright-report/
