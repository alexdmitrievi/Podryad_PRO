name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pwa

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pwa/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate SQL migrations
        run: |
          for f in ../supabase/migrations/*.sql; do
            echo "Checking $f..."
            head -1 "$f" | grep -qE '^(--|CREATE|ALTER|INSERT|DO|BEGIN|SET)' || (echo "ERROR: $f has invalid first line" && exit 1)
          done
          echo "All migrations validated"

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests with coverage
        run: npx vitest run --coverage

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY || 'placeholder' }}
          NEXT_PUBLIC_BOT_NAME: test_bot
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: placeholder
          CUSTOMER_JWT_SECRET: ${{ secrets.STAGING_CUSTOMER_JWT_SECRET || 'placeholder' }}
          SESSION_SECRET: ${{ secrets.STAGING_SESSION_SECRET || 'placeholder' }}

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: pwa/coverage/

  e2e-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pwa

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pwa/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run API e2e tests
        run: npm run test:e2e:api
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY || 'placeholder' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY || 'placeholder' }}
          NEXT_PUBLIC_BOT_NAME: test_bot
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: placeholder
          CRON_SECRET: test-cron-secret-local
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          CUSTOMER_JWT_SECRET: ${{ secrets.STAGING_CUSTOMER_JWT_SECRET || 'placeholder' }}
          SESSION_SECRET: ${{ secrets.STAGING_SESSION_SECRET || 'placeholder' }}
          ADMIN_PIN: ${{ secrets.STAGING_ADMIN_PIN || '2407' }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-api
          path: pwa/playwright-report/

  e2e-browser:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pwa
    needs: lint-build-test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pwa/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run browser e2e tests
        run: npx playwright test --project='Mobile Chrome' --project='Desktop Chrome'
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY || 'placeholder' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY || 'placeholder' }}
          NEXT_PUBLIC_BOT_NAME: test_bot
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: placeholder
          CRON_SECRET: test-cron-secret-local
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          CUSTOMER_JWT_SECRET: ${{ secrets.STAGING_CUSTOMER_JWT_SECRET || 'placeholder' }}
          SESSION_SECRET: ${{ secrets.STAGING_SESSION_SECRET || 'placeholder' }}
          ADMIN_PIN: ${{ secrets.STAGING_ADMIN_PIN || '2407' }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-browser
          path: pwa/playwright-report/

  # Only run on push to main (not PR)
  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [lint-build-test, e2e-api, e2e-browser]
    environment:
      name: production
      url: https://podryad.pro

    steps:
      - uses: actions/checkout@v4

      - name: Trigger Vercel production deploy
        run: |
          curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}

      - name: Deployment status
        run: |
          echo "Production deployment triggered."
          echo "Monitor: https://vercel.com/dashboard"
