# Ежедневная проверка доступа к Supabase + расширение под фоновые задачи (тендеры и др.).
# Секреты репозитория (Settings → Secrets and variables → Actions):
#   SUPABASE_URL — тот же URL, что NEXT_PUBLIC_SUPABASE_URL (https://xxx.supabase.co)
#   SUPABASE_SERVICE_ROLE_KEY — service_role key (не anon)

name: Tender status update

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r scripts/requirements.txt
      - name: Run status updater
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/run_status_update.py
